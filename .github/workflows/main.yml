name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Purge corrupt dependencies and Build
      run: |
        mvn dependency:purge-local-repository -B -DactTransitively=false -DreResolve=false --file pom.xml || true
        mvn clean package -B --file pom.xml
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Plugin
        path: target/*.jar
